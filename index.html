<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jumping Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
      <h1>T-Rex Jumping Game</h1>
    </header>

    <main>
      <p>Score: <span id="score">0</span></p>
      <p>Distance Travelled: <span id="distance">0 km</span></p>
      <p>Time Survived: <span id="time">0 s</span></p>
    </main>

    <div id="game">
      <div id="character"></div>
      <div id="obstacle"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
