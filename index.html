<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jumping Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>T-Rex Jumping Game</h1>
  </header>

  <main>

    <div id="stats">
      <span id="score">Score: 0</span>
      <span id="distance">Distance: 0m</span>
      <span id="time">Time: 0s</span>
    </div>

    <div id="game">

      <!-- Game Over overlay -->
      <div id="gameover">
        <h2>Game Over!</h2>
        <p id="finalscore">Your score: 0</p>
        <button onclick="restartGame()">Play Again</button>
      </div>

      <div id="character"></div>

    </div>

    <!-- INSTRUCTIONS -->
    <p id="instructions">Press <kbd>Space</kbd> to jump</p>

  </main>

  <footer>
    <div class="footer__inner">
      <span>© 2025 T-Rex Jumping Game</span>
    </div>
  </footer>

  <script src="index.js"></script>
</body>
</html>
